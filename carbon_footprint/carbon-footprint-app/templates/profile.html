<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarbonIQ — My Profile</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:.5rem;">
      <span class="brand-icon">🌍</span><span class="brand-name">CarbonIQ</span>
    </a>
  </div>
  <div class="nav-links">
    <a href="/calculator" class="nav-link">New Calculation</a>
    <button class="btn btn-ghost" onclick="logout()">Logout</button>
  </div>
</nav>

<main class="profile-page">
  <div class="profile-header">
    <div class="avatar">🌿</div>
    <div>
      <h1 id="profileUsername">Loading...</h1>
      <p id="profileSubtitle">Your carbon footprint history</p>
    </div>
  </div>

  <div class="profile-stats" id="profileStats"></div>

  <div class="history-section">
    <h3>📊 Progress Chart</h3>
    <div class="chart-card">
      <canvas id="progressChart" height="200"></canvas>
    </div>
  </div>

  <div class="history-section">
    <h3>🗂️ Calculation History</h3>
    <div id="historyList" class="history-list">
      <div class="history-loading">Loading your history...</div>
    </div>
  </div>

  <div style="text-align:center;margin-top:2rem;">
    <a href="/calculator" class="btn btn-primary">+ New Calculation</a>
  </div>
</main>

<script src="/static/js/main.js"></script>
<script src="/static/js/profile.js"></script>
</body>
</html>
